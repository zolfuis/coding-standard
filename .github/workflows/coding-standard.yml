name: Coding Standard

on:
  push:
  pull_request:

jobs:
  phpcs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']

    name: PHP ${{ matrix.php }} – PHPCS

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPCS (excluding future-PHP example dirs)
        run: |
          IGNORE=""
          if [[ "${{ matrix.php }}" < "8.2" ]]; then IGNORE="${IGNORE},examples/Php82"; fi
          if [[ "${{ matrix.php }}" < "8.3" ]]; then IGNORE="${IGNORE},examples/Php83"; fi
          if [[ "${{ matrix.php }}" < "8.4" ]]; then IGNORE="${IGNORE},examples/Php84"; fi
          IGNORE="${IGNORE#,}"
          if [[ -n "$IGNORE" ]]; then
            vendor/bin/phpcs --standard=phpcs.xml --extensions=php --ignore="$IGNORE"
          else
            vendor/bin/phpcs --standard=phpcs.xml --extensions=php
          fi
